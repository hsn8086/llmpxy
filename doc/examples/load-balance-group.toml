[server]
host = "127.0.0.1"
port = 8080

[route]
type = "group"
name = "balanced"

[proxy]
strip_unsupported_fields = true
log_level = "info"

[retry]
provider_error_threshold = 3
base_backoff_seconds = 1.0
max_backoff_seconds = 60.0
max_rounds = 5

[logging]
dir = "./logs"
info_file = "info.log"
debug_file = "debug.log"
rotation = "100 MB"
retention = "10 days"

[storage]
backend = "sqlite"
sqlite_path = "./data/gpt-trans.db"
ttl_seconds = 604800

[[providers]]
name = "provider-a"
base_url = "https://provider-a.example.com/v1"
api_key_env = "PROVIDER_A_API_KEY"
timeout_seconds = 120.0

[providers.models]
"gpt-4.1" = "provider-a-chat-model"

[[providers]]
name = "provider-b"
base_url = "https://provider-b.example.com/v1"
api_key_env = "PROVIDER_B_API_KEY"
timeout_seconds = 120.0

[providers.models]
"gpt-4.1" = "provider-b-chat-model"

[[providers]]
name = "provider-c"
base_url = "https://provider-c.example.com/v1"
api_key_env = "PROVIDER_C_API_KEY"
timeout_seconds = 120.0

[providers.models]
"gpt-4.1" = "provider-c-chat-model"

[[provider_groups]]
name = "balanced"
strategy = "load_balance"
members = ["provider-a", "provider-b", "provider-c"]
